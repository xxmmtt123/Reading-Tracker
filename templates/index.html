<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10a57b" />
  <title>Reading Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 class="main-title">Reading Track</h1>
      </div>
      <p class="subtitle">Check if you read today, switch weekly/monthly/yearly view, and record what books you read.</p>
    </header>

    <section class="tab-bar">
      <button id="tabToday" class="tab-button active">Daily</button>
      <button id="tabBooks" class="tab-button">Library</button>
    </section>

    <section id="todayView" class="panel">
      <div class="checkin-card">
        <h2>Did you read today?</h2>
        <button id="todayCheckin" class="primary-button">Loading...</button>
        <p id="checkinStatus" class="value-text"></p>
      </div>

      <div class="stats-card">
        <div class="stats-header">
          <div>
            <h2>Reading view</h2>
            <p class="subtitle">Select a period to see summary and daily read status.</p>
          </div>
          <div class="view-buttons">
            <button data-view="weekly" class="view-button active">Weekly</button>
            <button data-view="monthly" class="view-button">Monthly</button>
            <button data-view="yearly" class="view-button">Yearly</button>
            <button type="button" id="exportDateHistory" class="view-button">Download history</button>
          </div>
        </div>
        <div class="picker-row">
          <label class="picker-label">
            Choose period
            <input id="periodPicker" type="week" />
          </label>
        </div>
        <div class="stats-summary">
          <div class="summary-item">
            <span class="summary-label">Read days</span>
            <strong id="summaryDays">0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Completion</span>
            <strong id="summaryRate">0%</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Longest streak</span>
            <strong id="summaryStreak">0</strong>
          </div>
        </div>
        <div id="statsChart" class="chart-grid"></div>
      </div>
    </section>

    <section id="booksView" class="panel hidden">
      <div class="summary-card single-summary">
        <div class="summary-item">
          <span class="summary-label">Total books</span>
          <strong id="totalBooks">0</strong>
        </div>
      </div>

      <div class="form-card">
        <h2>What did you read?</h2>
        <form id="readingForm">
          <label>
            Enter book title
            <input type="text" id="bookTitle" placeholder="Enter book title" required />
          </label>
          <label class="duration-label">
            Duration
            <div class="duration-inputs">
              <input type="number" id="readingDurationHours" placeholder="hours" min="0" />
              <input type="number" id="readingDurationMinutes" placeholder="mins" min="0" max="59" />
            </div>
          </label>
          <label>
            Date finished
            <input type="date" id="readingDate" required />
          </label>
          <label>
            Notes (optional)
            <textarea id="bookNotes" placeholder="Short notes or summary..."></textarea>
          </label>
          <button type="submit">Save reading</button>
        </form>
      </div>

      <div class="list-card">
        <div class="list-header">
            <h2>Reading history</h2>
            <button type="button" id="exportBookHistory" class="small-button">Export reading history</button>
        </div>
        <ul id="readingList"></ul>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
